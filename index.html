<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>yixianguni.cn - 备案公示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", system-ui;
      background: #f2f3f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 15px;
    }
    .notice-box {
      width: 100%;
      max-width: 720px;
      background: #fff;
      padding: 40px 35px;
      border-radius: 10px;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    }
    h2 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 30px;
      color: #1f2937;
    }
    .line {
      font-size: 16px;
      line-height: 2;
      margin: 12px 0;
    }
    .desc-text {
      margin: 20px 0;
      padding: 16px;
      background: #f7f8fa;
      border-radius: 6px;
      color: #444;
    }
    footer {
      text-align: center;
      padding: 25px 10px;
      font-size: 14px;
      color: #666;
      border-top: 1px solid #e5e7eb;
    }
    footer a {
      color: #0066cc;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    .split {
      margin: 0 10px;
      color: #aaa;
    }
  </style>
</head>
<body>
<main>
  <div class="notice-box">
    <h2>域名备案公示说明</h2>
    <div class="line"><strong>主办单位：</strong>福清市海口逸像云电子商务工作室（个体工商户）</div>
    <div class="line"><strong>域名：</strong>yixianguni.cn</div>
    <div class="desc-text">
      本域名仅用于微信小程序类目资质审核使用，暂未搭建对外运营网站，无资讯、交易、用户交互等线上服务。
    </div>
    <div class="line"><strong>ICP备案号：</strong>闽ICP备2026022695号-2</div>
  </div>
</main>

<footer>
  <!-- 公安备案文字链接，不会图片失效 -->
<a href="https://beian.mps.gov.cn/" target="_blank">
  <img src="./beian.png" style="width:16px;vertical-align:middle;margin-right:4px;">
  闽公网安备35018102240181号
</a>
</footer>
</body>
</html>
