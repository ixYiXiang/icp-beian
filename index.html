<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备案公示页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
        }
        .box {
            background: #fff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 24px;
            color: #222;
        }
        p {
            font-size: 15px;
            line-height: 1.8;
            margin: 12px 0;
        }
        .icp {
            margin-top: 30px;
            font-size: 14px;
        }
        .icp a {
            color: #0066cc;
            text-decoration: none;
        }
        .icp a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>域名备案公示说明</h1>
        <p>主办单位：福清市海口逸像云电子商务工作室（个体工商户）</p>
        <p>本域名 yixianguni.cn 仅用于微信小程序类目资质审核使用</p>
        <p>暂未搭建对外运营网站，无资讯、交易、用户交互等线上服务</p>
        <div class="icp">
            <a href="https://beian.miit.gov.cn/" target="_blank">闽ICP备2026022695号-2</a>
        </div>
    </div>
</body>
</html>
